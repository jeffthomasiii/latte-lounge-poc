---
layout: default
---

<article class="podcast-episode">
  <div class="container narrow">
    <p class="eyebrow">Podcast Episode</p>
    <h1>{{ page.title }}</h1>

    {% if page.episode %}
      <p class="post-meta">Episode {{ page.episode }}</p>
    {% endif %}

    <div class="post-content">
      {{ content }}
    </div>
  </div>
</article>
