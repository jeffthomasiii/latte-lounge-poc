---
layout: default
---

<section class="page-hero{% if page.collection_style %} collection-page-hero{% endif %}">
  <div class="container">
    <p class="eyebrow">{{ page.eyebrow }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="page-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </div>
</section>

<section class="page-content{% if page.collection_style %} collection-page-content{% endif %}">
  <div class="container{% unless page.content_width == 'wide' %} narrow{% endunless %}">
    {{ content }}
  </div>
</section>
