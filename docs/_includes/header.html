<header class="site-header">
  <div class="container header-inner simple-header">
    <a class="site-logo image-logo" href="{{ '/' | relative_url }}" aria-label="Latte & Lounge home">
      <img src="{{ '/assets/images/logo-latte-lounge-wordmark.png' | relative_url }}" alt="Latte & Lounge">
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      {% for item in site.data.navigation.main %}
        <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
